<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" rx="24" fill="#1e1e1e"/>

  <!-- Panel outline -->
  <rect x="30" y="30" width="240" height="240" rx="16" fill="none" stroke="#3a3a3a" stroke-width="2"/>

  <!-- Top bar accent -->
  <rect x="32" y="32" width="236" height="40" rx="14" fill="#2a2a2a"/>
  <rect x="32" y="56" width="236" height="2" fill="#3a3a3a"/>

  <!-- Status dots -->
  <!-- Blocked - Red -->
  <circle cx="90" cy="130" r="24" fill="#E74C3C" filter="url(#glow)"/>
  <!-- Working - Orange -->
  <circle cx="210" cy="130" r="24" fill="#F39C12" filter="url(#glow)"/>
  <!-- Done - Green -->
  <circle cx="90" cy="210" r="24" fill="#27AE60" filter="url(#glow)"/>
  <!-- Idle - Gray -->
  <circle cx="210" cy="210" r="24" fill="#7F8C8D"/>
</svg>
